name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (x64, onefile)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller sfm_convert_advanced_windows.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfm_convert_advanced-windows-x64
          path: dist/sfm_convert_advanced.exe

  build-macos:
    name: Build macOS (arm64, onedir)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller sfm_convert_advanced_gui.spec

      - name: Zip macOS app bundle
        run: |
          cd dist
          zip -r sfm_convert_advanced-macos-arm64.zip sfm_convert_advanced.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfm_convert_advanced-macos-arm64
          path: dist/sfm_convert_advanced-macos-arm64.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: sfm_convert_advanced-windows-x64
          path: release-assets/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: sfm_convert_advanced-macos-arm64
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
